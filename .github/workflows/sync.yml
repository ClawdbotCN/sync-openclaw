name: Auto Sync to Gitee

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Sync OpenClaw and Skills to Gitee
        env:
          # 使用你现有的 Gitee Token
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 配置 Git 身份
          git config --global user.email "lanxidj@vip.qq.com"
          git config --global user.name "OpenclawCN"

          # 循环处理两个仓库
          for repo in openclaw skills; do
            echo "Processing $repo..."
            
            # 1. 克隆 GitHub 源码 (使用 --depth 1 提速)
            git clone --depth 1 https://github.com/openclaw/$repo.git $repo
            
            cd $repo
            
            # 2. 强制使用 HTTPS + Token 格式添加远程地址 (这步最关键，彻底避开 SSH)
            git remote add gitee https://萌浪兔:${GITEE_TOKEN}@gitee.com/openclawcn/$repo.git
            
            # 3. 强制推送到 Gitee 的 main 分支
            # 既然你本地手动推的是 master:main，这里我们也保持一致
            git push -f gitee main || git push -f gitee master:main
            
            cd ..
            echo "$repo sync completed!"
          done
