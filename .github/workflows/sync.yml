name: Auto Sync to Gitee

on:
  schedule:
    # UTC 23:30 = 北京时间早上 7:30。错峰排队，稳稳当当！
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Sync OpenClaw and Skills to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config --global user.email "lanxidj@vip.qq.com"
          git config --global user.name "OpenclawCN"

          echo "正在验证 Token 并获取准确用户名..."
          GITEE_USER=$(curl -s "https://gitee.com/api/v5/user?access_token=${GITEE_TOKEN}" | jq -r .login)
          
          if [ "$GITEE_USER" == "null" ] || [ -z "$GITEE_USER" ]; then
            echo "❌ Token 验证失败！请检查 Token 是否有效。"
            exit 1
          fi
          echo "✅ 成功获取！当前 Token 的真实主人是: $GITEE_USER"

          # ----------------------------------------
          # 处理: openclaw
          # ----------------------------------------
          echo "========================================"
          echo "1. 正在全量克隆 openclaw (开启实时进度条)..."
          # 【新增】--progress 强制显示下载进度
          git clone --progress https://github.com/openclaw/openclaw.git temp_openclaw
          cd temp_openclaw
          
          echo "2. 配置 Gitee 远程地址..."
          git remote add gitee "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/openclawcn/openclaw.git"
          
          echo "3. 开始向 Gitee 推送 openclaw (开启详细日志)..."
          CUR_BRANCH=$(git branch --show-current)
          # 【新增】--progress 和 -v 强制显示推送进度和详细握手信息
          git push -v --progress -f gitee $CUR_BRANCH:main || git push -v --progress -f gitee $CUR_BRANCH:master
          cd ..
          rm -rf temp_openclaw
          echo "✅ openclaw 同步完成！"

          # ----------------------------------------
          # 处理: skills
          # ----------------------------------------
          echo "========================================"
          echo "1. 正在全量克隆 skills (包含 10 万个文件，开启实时进度条)..."
          git clone --progress https://github.com/openclaw/skills.git temp_skills
          cd temp_skills
          
          echo "2. 配置 Gitee 远程地址..."
          git remote add gitee "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/openclawcn/skills.git"
          
          echo "3. 开始向 Gitee 推送 skills (开启详细日志)..."
          CUR_BRANCH=$(git branch --show-current)
          git push -v --progress -f gitee $CUR_BRANCH:main || git push -v --progress -f gitee $CUR_BRANCH:master
          cd ..
          rm -rf temp_skills
          echo "✅ 全部同步完成！"
