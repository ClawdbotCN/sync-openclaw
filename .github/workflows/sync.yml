name: Auto Sync to Gitee

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Sync OpenClaw and Skills to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config --global user.email "lanxidj@vip.qq.com"
          git config --global user.name "OpenclawCN"

          # ----------------------------------------
          # 处理: openclaw
          # ----------------------------------------
          echo "正在处理 openclaw..."
          git clone --depth 1 https://github.com/openclaw/openclaw.git temp_openclaw
          cd temp_openclaw
          # 使用英文ID配合Token
          git remote add gitee "https://openclawcn:${GITEE_TOKEN}@gitee.com/openclawcn/openclaw.git"
          
          CUR_BRANCH=$(git branch --show-current)
          git push -f gitee $CUR_BRANCH:main || git push -f gitee $CUR_BRANCH:master
          cd ..
          rm -rf temp_openclaw

          # ----------------------------------------
          # 处理: skills
          # ----------------------------------------
          echo "正在处理 skills..."
          git clone --depth 1 https://github.com/openclaw/skills.git temp_skills
          cd temp_skills
          # 使用英文ID配合Token
          git remote add gitee "https://openclawcn:${GITEE_TOKEN}@gitee.com/openclawcn/skills.git"
          
          CUR_BRANCH=$(git branch --show-current)
          git push -f gitee $CUR_BRANCH:main || git push -f gitee $CUR_BRANCH:master
          cd ..
          rm -rf temp_skills
          echo "全部同步完成！"
