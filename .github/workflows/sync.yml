name: Auto Sync to Gitee

on:
  schedule:
    # 每天北京时间早上 8 点自动同步一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你随时手动点击运行

jobs:
  sync-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror the GitHub repo to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          # 1. 原项目的 GitHub 用户名。如果是要同步 OpenClaw，请确认原作者的 ID
          src: github/OpenClaw
          # 2. 你的 Gitee 用户名，这里填写 OpenclawCN
          dst: gitee/OpenclawCN
          dst_key: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          # 3. 你想要同步的仓库名称。确认你的 Gitee 下已经建立了一个叫 OpenClaw 的空仓库
          static_list: "openclaw"
          force_update: true
          debug: true
